<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FU Car Renting - Đăng Ký Tài Khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/register.css">
</head>
<body>

<div class="register-container my-5">
    <div class="card register-card shadow-lg">
        <div class="card-body p-5">

            <div class="text-center mb-4">
                <h3 class="fw-bold text-dark">TẠO TÀI KHOẢN MỚI</h3>
                <p class="text-muted small">Vui lòng điền chính xác thông tin để thực hiện thuê xe</p>
            </div>

            <form action="#" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label font-semibold">Họ và tên</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-regular fa-user"></i></span>
                            <input type="text" class="form-control" placeholder="Nguyễn Văn A" required>
                        </div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label font-semibold">Số điện thoại</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
                            <input type="tel" class="form-control" placeholder="09xxxxxxxx" required>
                        </div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label font-semibold">Ngày sinh</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-regular fa-calendar"></i></span>
                            <input type="date" class="form-control" required>
                        </div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label font-semibold">Số CCCD / Hộ chiếu</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-regular fa-id-card"></i></span>
                            <input type="text" class="form-control" placeholder="Căn cước công dân" required>
                        </div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label font-semibold">Số bằng lái xe (GPLX)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-id-badge"></i></span>
                            <input type="text" class="form-control" placeholder="Nhập số GPLX" required>
                        </div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label font-semibold">Ngày cấp GPLX</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-calendar-day"></i></span>
                            <input type="date" class="form-control" required>
                        </div>
                    </div>

                    <div class="col-12 mb-3">
                        <label class="form-label font-semibold">Địa chỉ Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                            <input type="email" class="form-control" placeholder="example@gmail.com" required>
                        </div>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label font-semibold">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label font-semibold">Xác nhận mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-shield-halved"></i></span>
                            <input type="password" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>
                </div>

                <button class="btn btn-success w-100 py-2.5 mb-3 fw-bold btn-register" type="submit">
                    ĐĂNG KÝ TÀI KHOẢN
                </button>
            </form>

            <div class="text-center mt-3">
                <p class="small text-muted mb-0">Đã có tài khoản?
                    <a href="login.html" class="text-success text-decoration-none fw-bold">Đăng nhập tại đây</a>
                </p>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
