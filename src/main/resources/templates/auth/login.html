<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FU Car Renting - Đăng Nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="login-container">
    <div class="card login-card shadow-lg">
        <div class="card-body p-5">

            <div class="text-center mb-4">
                <div class="brand-icon mb-2">
                    <i class="fa-solid fa-car-side fa-2x text-primary"></i>
                </div>
                <h3 class="fw-bold text-dark">FU CAR RENTING</h3>
                <p class="text-muted small">Hệ thống thuê xe trực tuyến hàng đầu</p>
            </div>

            <form action="#" method="POST">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" required>
                    <label for="floatingEmail"><i class="fa-regular fa-envelope me-2"></i>Địa chỉ Email</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                    <label for="floatingPassword"><i class="fa-solid fa-lock me-2"></i>Mật khẩu</label>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-input-label small text-secondary" for="rememberMe">
                            Ghi nhớ đăng nhập
                        </label>
                    </div>
                    <a href="forgot-password.html" class="small text-primary text-decoration-none fw-semibold">Quên mật khẩu?</a>
                </div>

                <button class="btn btn-primary w-100 py-2.5 mb-3 fw-bold btn-login" type="submit">
                    ĐĂNG NHẬP
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="small text-muted mb-0">Chưa có tài khoản?
                    <a href="register.html" class="text-primary text-decoration-none fw-bold">Đăng ký ngay</a>
                </p>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
