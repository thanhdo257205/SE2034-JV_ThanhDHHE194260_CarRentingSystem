<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FU Car Renting - Quên Mật Khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/forgot.css">
</head>
<body>

<div class="forgot-container">
    <div class="card forgot-card shadow-lg text-center">
        <div class="card-body p-5">

            <div class="lock-icon-box mb-4">
                <i class="fa-solid fa-lock-open fa-2x text-warning"></i>
            </div>

            <h3 class="fw-bold text-dark mb-2">QUÊN MẬT KHẨU?</h3>
            <p class="text-muted small mb-4">
                Nhập email đăng ký của bạn bên dưới. Hệ thống sẽ gửi cho bạn một liên kết để đặt lại mật khẩu mới.
            </p>

            <form action="#" method="POST">
                <div class="form-floating mb-4">
                    <input type="email" class="form-control" id="forgotEmail" placeholder="name@example.com" required>
                    <label for="forgotEmail"><i class="fa-regular fa-envelope me-2"></i>Nhập Email của bạn</label>
                </div>

                <button class="btn btn-warning w-100 py-2.5 text-white fw-bold btn-submit mb-3" type="submit">
                    GỬI YÊU CẦU KHÔI PHỤC
                </button>
            </form>

            <div class="mt-4">
                <a href="login.html" class="text-decoration-none small text-secondary fw-bold back-to-login">
                    <i class="fa-solid fa-arrow-left me-2"></i>Quay lại trang Đăng nhập
                </a>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
